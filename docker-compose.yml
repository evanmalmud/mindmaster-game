services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plot_points
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/plot_points"
      SESSION_SECRET: "local-dev-session-secret-change-in-production"
      ENCRYPTION_SECRET: "local-dev-encryption-secret-min-length"
      RESEND_API_KEY: "re_placeholder_local_dev"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-placeholder}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-placeholder}"
      GOOGLE_CALLBACK_URL: "http://localhost:3000/auth/google/callback"
      AUTH0_CLIENT_ID: "${AUTH0_CLIENT_ID:-placeholder}"
      AUTH0_CLIENT_SECRET: "${AUTH0_CLIENT_SECRET:-placeholder}"
      AUTH0_CALLBACK_URL: "http://localhost:3000/auth/auth0/callback"
      AUTH0_DOMAIN_URL: "${AUTH0_DOMAIN_URL:-https://placeholder.auth0.com}"
      NODE_ENV: "production"

volumes:
  pgdata:
