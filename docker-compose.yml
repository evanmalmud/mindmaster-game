services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: mind_master
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mind_master"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindmaster-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mindmaster.rule=Host(`mindmaster.sleepydonut.com`)"
      - "traefik.http.routers.mindmaster.entrypoints=web"
      - "traefik.http.services.mindmaster.loadbalancer.server.port=3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/mind_master"
      SESSION_SECRET: "${SESSION_SECRET:local-dev-session-secret-change-in-production}"
      ENCRYPTION_SECRET: "${ENCRYPTION_SECRET:local-dev-encryption-secret-min-length}"
      RESEND_API_KEY: "${RESEND_API_KEY:re_placeholder_local_dev}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-placeholder}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-placeholder}"
      GOOGLE_CALLBACK_URL: "${GOOGLE_CALLBACK_URL:-https://mindmaster.sleepydonut.com/api/auth/callback/google}"
      NODE_ENV: "production"
    networks:
      - mindmaster-network
      - mediastack

volumes:
  pgdata:
networks:
  mindmaster-network:
    driver: bridge
  mediastack:
    external: true