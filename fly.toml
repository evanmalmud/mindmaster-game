# fly.toml app configuration file generated for plot-points on 2024-01-24T12:41:45-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "plot-points"
primary_region = "ewr"

[build]

[deploy]
release_command = "bash ./scripts/migrate.sh"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
